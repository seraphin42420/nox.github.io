<div class="crime" style="border-left: 4px solid #ef4444; background: rgba(239, 68, 68, 0.1);">

    <p class="desc" style="color: #e2e8f0; font-weight: 500;">
        Acces nivel înalt. Utilizarea armamentului greu se face doar în situații de cod roșu.
    </p>
</div>

<div class="crime" style="border-left: 4px solid #3b82f6;">

    <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center;">
        <img src="images/militaryrifle.png" style="width: 100%; height: 100px; object-fit: contain;" alt="Military Rifle" onerror="this.style.display='none'">

        <span style="font-size: 11px; color: #9ca3af; text-transform: uppercase;">Armă de calibru înalt</span>
    </div>

    <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center;">
        <img src="images/pumpshotgun.png" style="width: 100%; height: 100px; object-fit: contain;" alt="Pump Shotgun" onerror="this.style.display='none'">
        <h4 style="margin: 10px 0 0 0; color: #fff;">Pump Shotgun</h4>
        <span style="font-size: 11px; color: #9ca3af; text-transform: uppercase;">Armă Tactică</span>
    </div>

    <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center;">
        <img src="images/pistol50.png" style="width: 100%; height: 100px; object-fit: contain;" alt="Pistol .50" onerror="this.style.display='none'">

        <span style="font-size: 11px; color: #9ca3af; text-transform: uppercase;">Calibru Mare</span>
    </div>

    <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center;">
        <img src="images/taser.png" style="width: 100%; height: 100px; object-fit: contain;" alt="Taser" onerror="this.style.display='none'">
        <h4 style="margin: 10px 0 0 0; color: #fbbf24;">Stun Gun (Taser)</h4>
        <span style="font-size: 11px; color: #9ca3af; text-transform: uppercase;">Neletal</span>
    </div>

</div>
